<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>시나리오 토론 · 싱크탱크</title><link rel="stylesheet" href="styles.css"></head>
<body><main id="root"></main>
<script src="data.js"></script>
<script type="module">
import { DB, qs, byId, childrenOf, el, mountNav, toggleStar, isStarred, starCount, setEdit, applyEdit, moderate } from './app.js';
mountNav('dashboard');
const root = document.getElementById('root');
const raw = byId(DB.scenarios, qs('id'));
if (!raw) { root.append(el('p',{class:'empty'},'시나리오 없음')); }
else {
  const s = applyEdit(raw);   // 편집 반영본
  const issue = byId(DB.issues, s.issueId);
  const parent = s.parentScenarioId ? byId(DB.scenarios, s.parentScenarioId) : null;
  root.append(el('div',{class:'crumb'}, [el('a',{href:`index.html?issue=${issue.id}`}, '대시보드'), ` › ${issue.title}`]));
  if (parent) root.append(el('div',{class:'crumb'}, ['분기 출처: ', el('a',{href:`scenario.html?id=${parent.id}`}, parent.title)]));

  const h = el('h1',{}, s.title); root.append(h);
  // star (지지) — realizedAt/reflected와 독립
  const starEl = el('button',{class:'star', type:'button', 'aria-pressed':String(isStarred(raw)), 'aria-label':'이 시나리오 지지'}, `${isStarred(raw)?'★':'☆'} ${starCount(raw)}`);
  starEl.addEventListener('click',()=>{ toggleStar(raw.id); starEl.setAttribute('aria-pressed', String(isStarred(raw))); starEl.textContent = `${isStarred(raw)?'★':'☆'} ${starCount(raw)}`; });
  root.append(el('div',{style:'margin:4px 0 12px'}, [starEl, s.realizedAt ? el('span',{class:'badge heat-low',style:'margin-left:10px'}, `현실화 ${s.realizedAt}`) : el('span',{class:'badge',style:'margin-left:10px'},'미현실')]));

  const body = el('p',{}, s.body); root.append(body);
  root.append(el('div',{class:'card'}, [ el('strong',{},'토론 요약'), el('p',{style:'margin:6px 0 0'}, s.discussionSummary) ]));
  root.append(el('div',{class:'card'}, [ el('strong',{},'근거'), el('p',{style:'margin:6px 0 0'}, s.rationale) ]));

  // 인라인 편집 (목 → localStorage → 지도·분석 반영)
  const editWrap = el('form',{id:'edit-form', class:'card', style:'display:none'});
  const eTitle = el('input',{id:'edit-title', value:s.title, style:'width:100%;margin:6px 0'});
  const eBody = el('textarea',{id:'edit-body', rows:'4', style:'width:100%;margin:6px 0'}); eBody.value = s.body;
  editWrap.append(
    el('strong',{},'시나리오 편집(목)'),
    el('label',{for:'edit-title', style:'display:block'},'제목'), eTitle,
    el('label',{for:'edit-body', style:'display:block'},'설명'), eBody,
    el('button',{class:'btn', type:'button', onclick:()=>{
      const nt = eTitle.value.trim(), nb = eBody.value.trim();
      if (!nt || !nb) { alert('제목과 설명을 모두 입력하세요'); return; }
      setEdit(raw.id,{title:nt,body:nb}); h.textContent=nt; body.textContent=nb; toggleEdit(false);
    }},'저장'));
  const editBtn = el('button',{class:'btn ghost', 'aria-expanded':'false', 'aria-controls':'edit-form', onclick:()=>toggleEdit()},'✎ 편집');
  function toggleEdit(open) {
    const show = open ?? editWrap.style.display==='none';
    editWrap.style.display = show ? 'block' : 'none';
    editBtn.setAttribute('aria-expanded', String(show));
    if (show) eTitle.focus();
  }
  root.append(editBtn, editWrap);

  // 코멘트 (모더레이션 마스킹)
  root.append(el('h2',{},'토론'));
  const cs = DB.comments.filter(c => c.scenarioId === raw.id);
  if (!cs.length) root.append(el('p',{class:'empty'},'아직 코멘트 없음'));
  cs.forEach(c => root.append(el('div',{class:'card'}, [ el('strong',{},c.author), el('span',{class:'crumb'},` · ${c.ts}`), el('p',{style:'margin:6px 0 0'}, moderate(c.body)) ])));

  // 하위 분기
  const kids = childrenOf(raw.id);
  if (kids.length) { root.append(el('h2',{},'여기서 분기된 시나리오'));
    kids.forEach(k => root.append(el('div',{class:'card'}, el('a',{href:`scenario.html?id=${k.id}`}, k.title)))); }
}
</script></body></html>
